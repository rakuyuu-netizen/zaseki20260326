<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在籍状況集計ダッシュボード</title>
    <!-- Tailwind CSS (スタイリング用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (Excel読み込み/出力用) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Lucide Icons (アイコン用) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF生成用ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        /* カスタムスクロールバー (モダン) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* 固定列の影 */
        .sticky-shadow-right { box-shadow: 4px 0 12px -4px rgba(0,0,0,0.05); }
        /* クリック可能なセルのスタイル */
        .clickable-cell { cursor: pointer; transition: background-color 0.15s, transform 0.1s; }
        .clickable-cell:hover { background-color: #eff6ff !important; transform: scale(0.98); border-radius: 4px; box-shadow: inset 0 0 0 1px #bfdbfe; }
        .clickable-cell:active { transform: scale(0.95); }

        /* PDF出力用：透過・ぼかし効果を無効化して文字をくっきりさせる */
        body.pdf-exporting * {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        body.pdf-exporting .bg-white\/90, 
        body.pdf-exporting .bg-white\/80 { background-color: #ffffff !important; }
        body.pdf-exporting .bg-slate-50\/90, 
        body.pdf-exporting .bg-slate-50\/80 { background-color: #f8fafc !important; }
        body.pdf-exporting .bg-blue-50\/90, 
        body.pdf-exporting .bg-blue-50\/80 { background-color: #eff6ff !important; }
        body.pdf-exporting .bg-emerald-50\/90, 
        body.pdf-exporting .bg-emerald-50\/80 { background-color: #ecfdf5 !important; }
        body.pdf-exporting .bg-violet-50\/90, 
        body.pdf-exporting .bg-violet-50\/80 { background-color: #f5f3ff !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased selection:bg-blue-100 selection:text-blue-900 relative">
    
    <!-- ヘッダー (グラスモーフィズム) -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200/60 sticky top-0 z-40 transition-all">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-blue-600 to-indigo-500 p-2 rounded-xl shadow-sm text-white">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                </div>
                <h1 class="text-lg font-bold text-slate-800 tracking-tight">在籍状況ダッシュボード</h1>
            </div>
            
            <!-- Excel出力ボタン (初期状態は disabled) -->
            <button id="excelDownloadBtn" onclick="downloadExcel()" disabled class="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-emerald-700 transition-colors focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
                <span>Excel出力</span>
            </button>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- コントロールパネル -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-6 mb-8 transition-shadow hover:shadow-md">
            <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
                <i data-lucide="file-up" class="w-4 h-4 text-blue-500"></i>
                データソースの選択
            </h2>
            <div class="flex flex-col sm:flex-row items-center gap-4">
                <div class="relative w-full sm:w-auto group">
                    <input type="file" id="fileInput" accept=".xlsx, .xls" class="block w-full sm:w-auto text-sm text-slate-500
                        file:mr-4 file:py-2.5 file:px-5
                        file:rounded-xl file:border-0
                        file:text-sm file:font-semibold
                        file:bg-slate-100 file:text-slate-700
                        hover:file:bg-slate-200 hover:file:text-slate-900 transition-all cursor-pointer border border-slate-200 rounded-xl p-1 bg-slate-50/50
                        focus:outline-none focus:ring-2 focus:ring-blue-500/20
                    "/>
                </div>
                <div id="statusMessage" class="text-sm font-medium text-blue-600 hidden flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-xl">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                    データを解析中...
                </div>
            </div>
            <div id="errorMessage" class="mt-4 text-sm text-red-600 hidden flex items-start gap-2 bg-red-50 p-4 rounded-xl border border-red-100">
                <i data-lucide="alert-circle" class="w-4 h-4 mt-0.5 shrink-0"></i>
                <span id="errorText" class="font-medium">エラーが発生しました</span>
            </div>
        </div>

        <!-- 結果表示エリア (初期は非表示) -->
        <div id="resultsArea" class="hidden animate-fade-in pb-8">
            
            <!-- タブナビゲーションとツールバー -->
            <div id="tabNavArea" class="mb-6 flex flex-col md:flex-row justify-between items-end gap-4">
                <div class="bg-slate-200/60 p-1 rounded-xl inline-flex space-x-1" id="tabContainer">
                    <button data-tab="both" class="tab-btn active bg-white text-blue-600 shadow-sm rounded-lg px-6 py-2 text-sm font-bold transition-all whitespace-nowrap">
                        すべて表示
                    </button>
                    <button data-tab="ginou" class="tab-btn text-slate-600 hover:text-slate-900 hover:bg-slate-200/50 rounded-lg px-6 py-2 text-sm font-medium transition-all whitespace-nowrap">
                        技能実習
                    </button>
                    <button data-tab="tokutei" class="tab-btn text-slate-600 hover:text-slate-900 hover:bg-slate-200/50 rounded-lg px-6 py-2 text-sm font-medium transition-all whitespace-nowrap">
                        特定技能
                    </button>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-xs text-slate-500 flex items-center gap-1 hidden md:flex">
                        <i data-lucide="mouse-pointer-click" class="w-3.5 h-3.5"></i>
                        人数をクリックで詳細表示
                    </div>
                    <!-- ダッシュボードPDF保存ボタン -->
                    <button id="mainPdfDownloadBtn" onclick="downloadMainPDF()" class="flex items-center gap-1.5 bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors shadow-sm disabled:opacity-50">
                        <i data-lucide="file-down" class="w-4 h-4"></i>
                        <span>ダッシュボードをPDF保存 (A4)</span>
                    </button>
                </div>
            </div>

            <!-- PDF出力時のみ表示されるタイトル -->
            <div id="mainPdfTitle" class="hidden text-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800" id="mainPdfTitleText">在籍状況ダッシュボード</h2>
            </div>

            <!-- テーブルエリア (クロス集計) -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 overflow-hidden relative" id="mainTableWrapper">
                <div class="overflow-x-auto overflow-y-auto max-h-[70vh] custom-scrollbar" id="mainTableScrollArea">
                    <table class="min-w-full text-sm border-separate border-spacing-0 w-max" id="mainTableElement">
                        <thead id="crossTableHead" class="bg-white">
                            <!-- JSで描画 -->
                        </thead>
                        <tbody id="crossTableBody" class="bg-white">
                            <!-- JSで描画 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- モーダルウィンドウ (詳細表示用) -->
    <div id="detailModal" class="fixed inset-0 z-[100] hidden">
        <!-- 背景オーバーレイ -->
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        
        <!-- モーダル本体 -->
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-5xl bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            
            <!-- モーダルヘッダー -->
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-100 text-blue-600 p-1.5 rounded-lg">
                        <i data-lucide="list-filter" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-slate-800 leading-tight" id="modalTitle">内訳リスト</h3>
                        <p class="text-xs text-slate-500 font-medium mt-0.5" id="modalSubtitle">詳細情報</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <!-- PDF保存ボタン -->
                    <button id="pdfDownloadBtn" onclick="downloadModalPDF()" class="flex items-center gap-1.5 bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors shadow-sm disabled:opacity-50">
                        <i data-lucide="file-down" class="w-4 h-4"></i>
                        <span>PDF保存 (A4)</span>
                    </button>
                    <!-- 閉じるボタン -->
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 hover:bg-slate-200 p-2 rounded-full transition-colors focus:outline-none">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            
            <!-- 印刷（PDF出力）対象エリア -->
            <div id="modalContentToPrint" class="flex-1 overflow-hidden flex flex-col bg-white">
                
                <!-- PDF出力時のみ表示するタイトル行 -->
                <div id="printHeader" class="hidden px-6 py-4 bg-white text-center border-b border-slate-200">
                    <h2 class="text-xl font-bold text-slate-800" id="printTitleText">タイトル</h2>
                    <p class="text-sm text-slate-500 mt-1" id="printCountText">該当件数: 0 件</p>
                </div>

                <!-- コンテンツ (リスト) -->
                <div id="modalScrollArea" class="flex-1 overflow-auto custom-scrollbar p-0 bg-white">
                    <table class="min-w-full text-sm text-left" id="modalTableElement">
                        <thead id="modalTableHead" class="text-xs text-slate-500 bg-slate-50 sticky top-0 shadow-sm z-10">
                            <tr>
                                <th class="px-6 py-3 font-bold border-b border-slate-200 whitespace-nowrap">企業名</th>
                                <th class="px-6 py-3 font-bold border-b border-slate-200 whitespace-nowrap">名前</th>
                                <th class="px-6 py-3 font-bold border-b border-slate-200 whitespace-nowrap">国籍</th>
                                <th class="px-6 py-3 font-bold border-b border-slate-200 whitespace-nowrap">ステータス</th>
                                <th class="px-6 py-3 font-bold border-b border-slate-200 whitespace-nowrap text-slate-400 text-xs">元シート名</th>
                                <th class="px-6 py-3 font-bold border-b border-slate-200 whitespace-nowrap text-slate-400 text-xs text-right">Excel行</th>
                            </tr>
                        </thead>
                        <tbody id="modalTableBody" class="divide-y divide-slate-100">
                            <!-- JSで描画 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- フッター -->
            <div class="px-6 py-3 border-t border-slate-200 bg-slate-50 flex justify-between items-center">
                <div class="text-sm font-medium text-slate-600">
                    該当件数: <span id="modalCount" class="font-bold text-blue-600 text-base">0</span> 件
                </div>
                <button onclick="closeModal()" class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-50 transition-colors shadow-sm">
                    閉じる
                </button>
            </div>
        </div>
    </div>

    <script>
        // Lucideアイコンの初期化
        lucide.createIcons();

        document.head.insertAdjacentHTML("beforeend", `<style>
            @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        </style>`);

        // 集計対象の定義
        const TARGETS_GINOU = [
            "技能実習(1号)",
            "技能実習(2号1年目)",
            "技能実習(2号2年目)",
            "技能実習(3号1年目)",
            "技能実習(3号2年目)",
            "入国前"
        ];

        const TARGETS_TOKUTEI = [
            "特定活動",
            "特定技能1号",
            "特定技能2号",
            "特定技能3号",
            "入国前"
        ];

        const SHEETS_TOKUTEI = [
            "特定技能◆その他◆",
            "特定技能◆ユキグニファクトリー◆",
            "特定技能◆ロイヤルデリカ◆",
            "特定技能◆第一屋製パン◆"
        ];

        // メモリ上で保持するデータ
        let parsedData = [];

        // タブの状態管理
        let currentTab = 'both';

        // 要素の取得
        const fileInput = document.getElementById('fileInput');
        const statusMessage = document.getElementById('statusMessage');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const resultsArea = document.getElementById('resultsArea');
        const detailModal = document.getElementById('detailModal');
        const excelDownloadBtn = document.getElementById('excelDownloadBtn');

        // タブボタンのイベントリスナー設定
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tabId = e.target.dataset.tab;
                switchTab(tabId);
            });
        });

        function switchTab(tabId) {
            currentTab = tabId;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.tab === tabId) {
                    btn.className = "tab-btn active bg-white text-blue-600 shadow-sm rounded-lg px-6 py-2 text-sm font-bold transition-all whitespace-nowrap";
                } else {
                    btn.className = "tab-btn text-slate-600 hover:text-slate-900 hover:bg-slate-200/50 rounded-lg px-6 py-2 text-sm font-medium transition-all whitespace-nowrap";
                }
            });

            updateDashboard();
        }

        // ファイル入力のイベントリスナー
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            errorMessage.classList.add('hidden');
            resultsArea.classList.add('hidden');
            resultsArea.classList.remove('animate-fade-in');
            statusMessage.classList.remove('hidden');

            setTimeout(() => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        
                        parseWorkbookData(workbook);
                        updateDashboard();
                        
                        statusMessage.classList.add('hidden');
                        excelDownloadBtn.disabled = false; // エクセル出力ボタンを有効化
                        
                        setTimeout(() => {
                            resultsArea.classList.remove('hidden');
                            resultsArea.classList.add('animate-fade-in');
                        }, 50);

                    } catch (err) {
                        console.error(err);
                        showError('ファイルの解析に失敗しました。正しいExcelファイルか確認してください。');
                        statusMessage.classList.add('hidden');
                    }
                };
                
                reader.onerror = function() {
                    showError('ファイルの読み込み中にエラーが発生しました。');
                    statusMessage.classList.add('hidden');
                };

                reader.readAsArrayBuffer(file);
            }, 300);
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        // データパース処理 (詳細表示用に項目を追加)
        function parseWorkbookData(workbook) {
            parsedData = [];

            // Helper: 名前の取得 (全角・半角スペースの揺らぎ対応)
            const getName = (row) => (row['名　前'] || row['名前'] || row['氏名'] || '未設定').trim();

            // 1. 技能実習生の処理
            const ginouSheetName = "技能実習生 (入国順)";
            if (workbook.Sheets[ginouSheetName]) {
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[ginouSheetName], {range: 1, defval: ""});
                rows.forEach((row, index) => {
                    const status = (row['現在のステータス'] || '').trim();
                    if (TARGETS_GINOU.includes(status)) {
                        parsedData.push({
                            type: 'ginou',
                            company: (row['会社名'] || '').trim() || '未設定',
                            status: status,
                            country: (row['国籍'] || '').trim() || '未設定',
                            name: getName(row),
                            sheetName: ginouSheetName,
                            rowNumber: index + 3 // 1行目タイトル、2行目ヘッダーなのでデータは3行目から
                        });
                    }
                });
            } else {
                console.warn(`シート「${ginouSheetName}」が見つかりません。`);
            }

            // 2. 特定技能の処理
            SHEETS_TOKUTEI.forEach(sheetName => {
                if (workbook.Sheets[sheetName]) {
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {range: 1, defval: ""});
                    rows.forEach((row, index) => {
                        const status = (row['(現在)ステータス'] || '').trim();
                        if (TARGETS_TOKUTEI.includes(status)) {
                            parsedData.push({
                                type: 'tokutei',
                                company: (row['会社名'] || '').trim() || '未設定',
                                status: status,
                                country: (row['国籍'] || '').trim() || '未設定',
                                name: getName(row),
                                sheetName: sheetName,
                                rowNumber: index + 3
                            });
                        }
                    });
                } else {
                    console.warn(`シート「${sheetName}」が見つかりません。`);
                }
            });
        }

        // 引数の文字列をエスケープする関数（onclickへの埋め込み用）
        function escapeArgs(str) {
            if (!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // ダッシュボード更新ロジック (クロス集計表の生成)
        function updateDashboard() {
            const targetData = parsedData.filter(d => currentTab === 'both' || d.type === currentTab);

            const companySet = new Set(targetData.map(d => d.company));
            let companies = Array.from(companySet);

            let countryTotals = {};
            targetData.forEach(d => {
                countryTotals[d.country] = (countryTotals[d.country] || 0) + 1;
            });
            const countriesList = Object.keys(countryTotals).sort((a, b) => countryTotals[b] - countryTotals[a]);

            const counts = {}; 
            const totalCounts = { total: 0, status: {}, country: {} }; 

            companies.forEach(c => {
                counts[c] = { total: 0, status: {}, country: {} };
                TARGETS_GINOU.forEach(s => counts[c].status[s] = 0);
                TARGETS_TOKUTEI.forEach(s => counts[c].status[s] = 0);
                countriesList.forEach(ct => counts[c].country[ct] = 0);
            });
            TARGETS_GINOU.forEach(s => totalCounts.status[s] = 0);
            TARGETS_TOKUTEI.forEach(s => totalCounts.status[s] = 0);
            countriesList.forEach(ct => totalCounts.country[ct] = 0);

            targetData.forEach(d => {
                const c = d.company;
                counts[c].total++;
                totalCounts.total++;
                
                if (TARGETS_GINOU.includes(d.status) || TARGETS_TOKUTEI.includes(d.status)) {
                    counts[c].status[d.status]++;
                    totalCounts.status[d.status]++;
                }
                
                if (countriesList.includes(d.country)) {
                    counts[c].country[d.country]++;
                    totalCounts.country[d.country]++;
                }
            });

            companies.sort((a, b) => {
                const totalA = counts[a].total;
                const totalB = counts[b].total;
                if (totalB !== totalA) {
                    return totalB - totalA;
                }
                return a.localeCompare(b, 'ja');
            });

            // --- Thead作成 ---
            let theadHtml = `<tr>
                <th rowspan="2" class="sticky left-0 top-0 bg-white px-3 text-center font-bold text-slate-800 border-b border-r border-slate-200 z-[50] w-[60px] min-w-[60px] max-w-[60px] align-middle">No.</th>
                <th rowspan="2" class="sticky left-[60px] top-0 bg-white px-5 text-left font-bold text-slate-800 border-b border-r border-slate-200 z-[50] w-[260px] min-w-[260px] max-w-[260px] sticky-shadow-right align-middle">会社名</th>
                <th rowspan="2" class="sticky left-[320px] top-0 bg-slate-50 px-5 text-right font-extrabold text-blue-600 border-b border-r border-slate-200 z-[50] w-[90px] min-w-[90px] max-w-[90px] sticky-shadow-right align-middle">合計</th>`;
            
            let statusHeader1 = '';
            let statusHeader2 = '';

            if (currentTab === 'both' || currentTab === 'ginou') {
                statusHeader1 += `<th colspan="${TARGETS_GINOU.length}" class="sticky top-0 bg-blue-50 px-4 h-[44px] text-center font-bold text-blue-800 border-b border-r border-slate-200 z-30">技能実習 ステータス</th>`;
                TARGETS_GINOU.forEach((s, idx) => {
                    let borderClass = 'border-r border-slate-200';
                    let displayName = s.replace(/([(（])/g, '<br>$1');
                    statusHeader2 += `<th class="sticky top-[44px] bg-white px-3 py-1.5 text-center text-xs font-semibold text-slate-600 border-b ${borderClass} z-30 whitespace-nowrap min-w-[5rem] leading-snug">${displayName}</th>`;
                });
            }

            if (currentTab === 'both' || currentTab === 'tokutei') {
                statusHeader1 += `<th colspan="${TARGETS_TOKUTEI.length}" class="sticky top-0 bg-emerald-50 px-4 h-[44px] text-center font-bold text-emerald-800 border-b border-r border-slate-200 z-30">特定技能 ステータス</th>`;
                TARGETS_TOKUTEI.forEach((s, idx) => {
                    let borderClass = 'border-r border-slate-200';
                    let displayName = s.replace(/([(（])/g, '<br>$1');
                    statusHeader2 += `<th class="sticky top-[44px] bg-white px-3 py-1.5 text-center text-xs font-semibold text-slate-600 border-b ${borderClass} z-30 whitespace-nowrap min-w-[5rem] leading-snug">${displayName}</th>`;
                });
            }

            statusHeader1 += `<th colspan="${countriesList.length}" class="sticky top-0 bg-violet-50 px-4 h-[44px] text-center font-bold text-violet-800 border-b border-slate-200 z-30">国別在籍人数</th>`;
            countriesList.forEach((c, idx) => {
                let borderClass = idx === countriesList.length - 1 ? 'border-r-0' : 'border-r border-slate-200';
                let displayName = c.replace(/([(（])/g, '<br>$1');
                statusHeader2 += `<th class="sticky top-[44px] bg-white px-3 py-1.5 text-center text-xs font-semibold text-slate-600 border-b ${borderClass} z-30 whitespace-nowrap min-w-[5rem] leading-snug">${displayName}</th>`;
            });

            theadHtml += statusHeader1 + `</tr><tr>` + statusHeader2 + `</tr>`;
            document.getElementById('crossTableHead').innerHTML = theadHtml;

            // --- Tbody作成 ---
            let tbodyHtml = '';

            companies.forEach((c, idx) => {
                const escCompany = escapeArgs(c);
                let trHtml = `<tr class="hover:bg-slate-50 group transition-colors duration-150">`;
                
                // No, 会社名と合計
                trHtml += `<td class="sticky left-0 bg-white px-3 py-3 border-b border-r border-slate-200 z-20 group-hover:bg-slate-50 text-center text-slate-500 font-mono w-[60px] max-w-[60px]">${idx + 1}</td>`;
                trHtml += `<td class="sticky left-[60px] bg-white px-5 py-3 border-b border-r border-slate-200 z-20 group-hover:bg-slate-50 sticky-shadow-right truncate font-medium text-slate-700 max-w-[260px]" title="${c}">${c}</td>`;
                trHtml += `<td class="sticky left-[320px] bg-slate-50 px-5 py-3 border-b border-r border-slate-200 z-20 text-right font-bold group-hover:bg-slate-100 sticky-shadow-right text-blue-600 max-w-[90px] ${counts[c].total > 0 ? 'clickable-cell' : ''}" ${counts[c].total > 0 ? `onclick="showDetails('${escCompany}', 'total', null, '${escCompany} 全員')"` : ''}>${counts[c].total}</td>`;
                
                // 技能実習列
                if (currentTab === 'both' || currentTab === 'ginou') {
                    TARGETS_GINOU.forEach((s) => {
                        const cnt = counts[c].status[s];
                        const escStatus = escapeArgs(s);
                        trHtml += `<td class="px-4 py-3 border-b border-r border-slate-100 text-center ${cnt>0 ? 'text-slate-800 font-semibold clickable-cell' : 'text-slate-300 font-light'}" ${cnt>0 ? `onclick="showDetails('${escCompany}', 'status', '${escStatus}', '${escCompany} / ${escStatus}')"` : ''}>${cnt>0 ? cnt : '-'}</td>`;
                    });
                }
                
                // 特定技能列
                if (currentTab === 'both' || currentTab === 'tokutei') {
                    TARGETS_TOKUTEI.forEach((s) => {
                        const cnt = counts[c].status[s];
                        const escStatus = escapeArgs(s);
                        trHtml += `<td class="px-4 py-3 border-b border-r border-slate-100 text-center ${cnt>0 ? 'text-slate-800 font-semibold clickable-cell' : 'text-slate-300 font-light'}" ${cnt>0 ? `onclick="showDetails('${escCompany}', 'status', '${escStatus}', '${escCompany} / ${escStatus}')"` : ''}>${cnt>0 ? cnt : '-'}</td>`;
                    });
                }
                
                // 国籍列
                countriesList.forEach((ct, idx) => {
                    const cnt = counts[c].country[ct];
                    const escCountry = escapeArgs(ct);
                    let borderClass = idx === countriesList.length - 1 ? 'border-r-0' : 'border-r border-slate-100';
                    trHtml += `<td class="px-4 py-3 border-b ${borderClass} text-center ${cnt>0 ? 'text-slate-800 font-semibold clickable-cell' : 'text-slate-300 font-light'}" ${cnt>0 ? `onclick="showDetails('${escCompany}', 'country', '${escCountry}', '${escCompany} / ${escCountry}')"` : ''}>${cnt>0 ? cnt : '-'}</td>`;
                });
                
                trHtml += `</tr>`;
                tbodyHtml += trHtml;
            });

            // 総合計行 (最下部)
            let totalHtml = `<tr class="bg-slate-100">`;
            totalHtml += `<td class="sticky left-0 bg-slate-100 px-3 py-4 border-t-2 border-slate-300 border-r border-slate-200 z-20 text-center text-slate-500 font-bold w-[60px] max-w-[60px]">-</td>`;
            totalHtml += `<td class="sticky left-[60px] bg-slate-100 px-5 py-4 border-t-2 border-slate-300 border-r border-slate-200 z-20 sticky-shadow-right text-slate-800 font-bold max-w-[260px]">総合計</td>`;
            totalHtml += `<td class="sticky left-[320px] bg-slate-200 px-5 py-4 border-t-2 border-slate-300 border-r border-slate-200 z-20 text-right sticky-shadow-right text-blue-700 font-extrabold text-base max-w-[90px] ${totalCounts.total > 0 ? 'clickable-cell' : ''}" ${totalCounts.total > 0 ? `onclick="showDetails('ALL', 'total', null, '全対象者')"` : ''}>${totalCounts.total}</td>`;

            if (currentTab === 'both' || currentTab === 'ginou') {
                TARGETS_GINOU.forEach((s) => {
                    const cnt = totalCounts.status[s];
                    const escStatus = escapeArgs(s);
                    totalHtml += `<td class="px-4 py-4 border-t-2 border-slate-300 border-r border-slate-200 text-center text-blue-800 font-bold ${cnt>0 ? 'clickable-cell' : ''}" ${cnt>0 ? `onclick="showDetails('ALL', 'status', '${escStatus}', '全体 / ${escStatus}')"` : ''}>${cnt}</td>`;
                });
            }
            if (currentTab === 'both' || currentTab === 'tokutei') {
                TARGETS_TOKUTEI.forEach((s) => {
                    const cnt = totalCounts.status[s];
                    const escStatus = escapeArgs(s);
                    totalHtml += `<td class="px-4 py-4 border-t-2 border-slate-300 border-r border-slate-200 text-center text-emerald-800 font-bold ${cnt>0 ? 'clickable-cell' : ''}" ${cnt>0 ? `onclick="showDetails('ALL', 'status', '${escStatus}', '全体 / ${escStatus}')"` : ''}>${cnt}</td>`;
                });
            }
            countriesList.forEach((ct, idx) => {
                const cnt = totalCounts.country[ct];
                const escCountry = escapeArgs(ct);
                let borderClass = idx === countriesList.length - 1 ? 'border-r-0' : 'border-r border-slate-200';
                totalHtml += `<td class="px-4 py-4 border-t-2 border-slate-300 ${borderClass} text-center text-violet-800 font-bold ${cnt>0 ? 'clickable-cell' : ''}" ${cnt>0 ? `onclick="showDetails('ALL', 'country', '${escCountry}', '全体 / ${escCountry}')"` : ''}>${cnt}</td>`;
            });

            totalHtml += `</tr>`;
            tbodyHtml += totalHtml;

            document.getElementById('crossTableBody').innerHTML = tbodyHtml;
            
            lucide.createIcons();
        }

        // ==========================================
        // モーダル詳細表示の制御
        // ==========================================
        function showDetails(company, filterType, filterValue, titleStr) {
            let filtered = parsedData.filter(d => currentTab === 'both' || d.type === currentTab);

            if (company !== 'ALL') {
                filtered = filtered.filter(d => d.company === company);
            }

            if (filterType === 'status') {
                filtered = filtered.filter(d => d.status === filterValue);
            } else if (filterType === 'country') {
                filtered = filtered.filter(d => d.country === filterValue);
            } else if (filterType === 'type') {
                filtered = filtered.filter(d => d.type === filterValue);
            }

            document.getElementById('modalTitle').textContent = titleStr;
            document.getElementById('modalCount').textContent = filtered.length;

            const tbody = document.getElementById('modalTableBody');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-slate-500">該当するデータがありません</td></tr>`;
            } else {
                filtered.forEach(d => {
                    let badgeClass = d.type === 'ginou' ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200';
                    
                    const trHtml = `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-3 border-b border-slate-100 font-medium text-slate-700 whitespace-normal break-words" title="${d.company}">${d.company}</td>
                            <td class="px-6 py-3 border-b border-slate-100 font-bold text-slate-900">${d.name}</td>
                            <td class="px-6 py-3 border-b border-slate-100 text-slate-700">${d.country}</td>
                            <td class="px-6 py-3 border-b border-slate-100">
                                <span class="border px-2 py-0.5 rounded text-xs font-semibold whitespace-nowrap ${badgeClass}">${d.status}</span>
                            </td>
                            <td class="px-6 py-3 border-b border-slate-100 text-slate-400 text-xs whitespace-normal break-words" title="${d.sheetName}">${d.sheetName}</td>
                            <td class="px-6 py-3 border-b border-slate-100 text-slate-400 text-xs text-right font-mono">${d.rowNumber}</td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', trHtml);
                });
            }

            detailModal.classList.remove('hidden');
        }

        function closeModal() {
            detailModal.classList.add('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !detailModal.classList.contains('hidden')) {
                closeModal();
            }
        });

        // ==========================================
        // Excel出力処理 (メインダッシュボードの表)
        // ==========================================
        function downloadExcel() {
            try {
                // 出力対象のテーブル要素を取得
                const table = document.getElementById('mainTableElement');
                
                // SheetJSを使ってテーブル要素からワークブックを生成
                // raw: true にすることで、数字が文字列になるなどの意図しない変換を防ぐ
                const wb = XLSX.utils.table_to_book(table, { raw: true });
                
                // 現在のタブ名をファイル名に反映
                let tabNameText = "すべて表示";
                if(currentTab === 'ginou') tabNameText = "技能実習";
                if(currentTab === 'tokutei') tabNameText = "特定技能";

                // Excelファイルとして保存
                XLSX.writeFile(wb, `在籍状況ダッシュボード_${tabNameText}.xlsx`);
                
            } catch (e) {
                console.error(e);
                alert('Excel出力中にエラーが発生しました。');
            }
        }

        // ==========================================
        // PDF出力処理 (モーダル：A4縦 1枚)
        // ==========================================
        async function downloadModalPDF() {
            const btn = document.getElementById('pdfDownloadBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>生成中...</span>';
            btn.disabled = true;
            lucide.createIcons();

            // 透過無効化クラスを一時的に付与（文字をくっきりさせるため）
            document.body.classList.add('pdf-exporting');
            
            const target = document.getElementById('modalContentToPrint');
            const scrollArea = document.getElementById('modalScrollArea');
            const printHeader = document.getElementById('printHeader');
            const tableHead = document.getElementById('modalTableHead');
            
            const originalMaxHeight = scrollArea.style.maxHeight;
            const originalOverflowX = scrollArea.style.overflowX;
            const originalHeadPosition = tableHead.style.position;
            const originalTargetWidth = target.style.width;
            
            document.getElementById('printTitleText').textContent = document.getElementById('modalTitle').textContent;
            document.getElementById('printCountText').textContent = `該当件数: ${document.getElementById('modalCount').textContent} 件`;
            
            // 表がはみ出さないよう横スクロールを解除し、幅を中身に合わせる
            scrollArea.style.maxHeight = 'none';
            scrollArea.style.overflowX = 'visible';
            tableHead.style.position = 'static'; 
            target.style.width = 'max-content';
            printHeader.classList.remove('hidden');

            try {
                await new Promise(r => setTimeout(r, 200));

                const canvas = await html2canvas(target, { 
                    scale: 3, // 解像度を上げて文字をくっきりさせる
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    windowWidth: target.scrollWidth,
                    width: target.scrollWidth
                });
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                const pdfW = pdf.internal.pageSize.getWidth();
                const pdfH = pdf.internal.pageSize.getHeight();
                const margin = 10;
                
                const maxW = pdfW - margin * 2;
                const maxH = pdfH - margin * 2;
                const imgW = canvas.width;
                const imgH = canvas.height;
                const ratio = Math.min(maxW / imgW, maxH / imgH);
                
                const renderW = imgW * ratio;
                const renderH = imgH * ratio;
                const x = margin + (maxW - renderW) / 2;
                const y = margin;
                
                // JPEGのノイズを無くすため、PNG形式で出力
                const imgData = canvas.toDataURL('image/png');
                pdf.addImage(imgData, 'PNG', x, y, renderW, renderH, undefined, 'FAST');
                
                const title = document.getElementById('modalTitle').textContent.replace(/\//g, '_').replace(/ /g, '');
                pdf.save(`内訳リスト_${title}.pdf`);
                
            } catch (e) {
                console.error(e);
                alert('PDF作成中にエラーが発生しました。');
            } finally {
                // UI復元
                scrollArea.style.maxHeight = originalMaxHeight;
                scrollArea.style.overflowX = originalOverflowX;
                tableHead.style.position = originalHeadPosition;
                target.style.width = originalTargetWidth;
                printHeader.classList.add('hidden');
                document.body.classList.remove('pdf-exporting');
                
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        // ==========================================
        // PDF出力処理 (メインダッシュボード：A4縦 1枚)
        // ==========================================
        async function downloadMainPDF() {
            const btn = document.getElementById('mainPdfDownloadBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>生成中...</span>';
            btn.disabled = true;
            lucide.createIcons();

            // 透過無効化クラスを一時的に付与（文字をくっきりさせるため）
            document.body.classList.add('pdf-exporting');
            
            const target = document.getElementById('resultsArea');
            const navArea = document.getElementById('tabNavArea');
            const mainPdfTitle = document.getElementById('mainPdfTitle');
            const tableContainer = document.getElementById('mainTableScrollArea');
            
            // 印刷時の表示調整 (タブやボタンを隠し、タイトルを表示)
            const originalNavDisplay = navArea.style.display;
            navArea.style.display = 'none';
            mainPdfTitle.classList.remove('hidden');

            let tabNameText = "すべて表示";
            if(currentTab === 'ginou') tabNameText = "技能実習";
            if(currentTab === 'tokutei') tabNameText = "特定技能";
            document.getElementById('mainPdfTitleText').textContent = `在籍状況ダッシュボード (${tabNameText})`;
            
            // 全体を描画するためスクロール制限と幅制限を解除
            const originalTableMaxHeight = tableContainer.style.maxHeight;
            const originalTableOverflowX = tableContainer.style.overflowX;
            const originalTargetWidth = target.style.width;

            tableContainer.style.maxHeight = 'none';
            tableContainer.style.overflowX = 'visible';
            target.style.width = 'max-content';

            // html2canvas のズレ防止のため sticky 要素を一時的に static に変更
            const stickyElements = target.querySelectorAll('.sticky');
            const originalStickyStyles = [];
            stickyElements.forEach(el => {
                originalStickyStyles.push({ el: el, position: el.style.position });
                el.style.position = 'static';
            });

            try {
                // DOMの更新を待つ
                await new Promise(r => setTimeout(r, 200));

                const canvas = await html2canvas(target, { 
                    scale: 3, // 解像度を上げて文字をくっきりさせる
                    useCORS: true,
                    backgroundColor: '#ffffff', // 背景を完全な白に
                    windowWidth: target.scrollWidth,
                    width: target.scrollWidth
                });
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4'); // 'p'=縦, 'a4'=A4サイズ
                
                const pdfW = pdf.internal.pageSize.getWidth();
                const pdfH = pdf.internal.pageSize.getHeight();
                const margin = 10;
                
                const maxW = pdfW - margin * 2;
                const maxH = pdfH - margin * 2;
                const imgW = canvas.width;
                const imgH = canvas.height;
                
                // 強制的にA4の1枚に収めるための縮小率
                const ratio = Math.min(maxW / imgW, maxH / imgH);
                
                const renderW = imgW * ratio;
                const renderH = imgH * ratio;
                const x = margin + (maxW - renderW) / 2;
                const y = margin;
                
                // JPEGのノイズを無くすため、PNG形式で出力
                const imgData = canvas.toDataURL('image/png');
                pdf.addImage(imgData, 'PNG', x, y, renderW, renderH, undefined, 'FAST');
                
                pdf.save(`在籍状況ダッシュボード_${tabNameText}.pdf`);
                
            } catch (e) {
                console.error(e);
                alert('PDF作成中にエラーが発生しました。');
            } finally {
                // UIを元の状態に戻す
                navArea.style.display = originalNavDisplay;
                mainPdfTitle.classList.add('hidden');
                
                tableContainer.style.maxHeight = originalTableMaxHeight;
                tableContainer.style.overflowX = originalTableOverflowX;
                target.style.width = originalTargetWidth;

                originalStickyStyles.forEach(item => {
                    item.el.style.position = item.position;
                });

                document.body.classList.remove('pdf-exporting');
                
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }
        }
    </script>
