<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外国人材 在籍数集計表</title>
    <!-- Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            background-color: #eceff1;
            color: #37474f;
            font-family: 'Roboto', 'Noto Sans JP', sans-serif;
        }
        .navbar-custom { background-color: #455a64 !important; }
        .card-custom {
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* --- テーブル・マトリクスのスタイル --- */
        .table-wrapper {
            max-height: 60vh;
            overflow: auto;
            position: relative;
        }
        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            background-color: #ffffff;
        }
        th, td {
            border-right: 1px solid #b0bec5;
            border-bottom: 1px solid #b0bec5;
            text-align: center;
            vertical-align: middle;
            padding: 8px 5px;
        }
        table { border-left: 1px solid #b0bec5; border-top: 1px solid #b0bec5; }
        
        .table-wrapper table th:not(.sticky-col-no):not(.sticky-col-company):not([colspan]),
        .table-wrapper table td:not(.sticky-col-no):not(.sticky-col-company) {
            min-width: 70px;
            width: 70px;
            max-width: 70px;
            height: 48px;
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.3;
        }

        thead th {
            position: sticky;
            background-color: #cfd8dc;
            color: #263238;
            font-weight: bold;
            z-index: 10;
        }
        thead tr:nth-child(1) th { top: 0; height: 40px; }
        thead tr:nth-child(2) th { top: 40px; height: 40px; }

        tfoot th {
            position: sticky;
            bottom: 0;
            background-color: #b0bec5;
            color: #1a237e;
            font-weight: bold;
            z-index: 10;
            border-top: 2px solid #78909c;
        }

        .sticky-col-no {
            position: sticky;
            left: 0;
            background-color: #f5f7f8;
            font-weight: bold;
            text-align: center;
            min-width: 40px;
            width: 40px;
            max-width: 40px;
            z-index: 5;
        }
        .sticky-col-company {
            position: sticky;
            left: 40px;
            background-color: #f5f7f8;
            font-weight: bold;
            text-align: left;
            min-width: 200px;
            width: 200px;
            max-width: 200px;
            white-space: normal;
            word-wrap: break-word;
            z-index: 5;
            box-shadow: 2px 0 4px rgba(0,0,0,0.05);
        }
        thead th.sticky-col-no, thead th.sticky-col-company { z-index: 15; background-color: #b0bec5; }
        tfoot th.sticky-col-no { z-index: 15; background-color: #90a4ae; border-right: none;}
        tfoot th.sticky-col-company { z-index: 15; background-color: #90a4ae; text-align: right; padding-right: 15px;}

        .total-col { background-color: #e8eaf6; font-weight: bold; color: #283593; }
        thead th.total-col { background-color: #c5cae9; }

        .tabs.custom-tabs { 
            background-color: transparent; 
            border-bottom: 1px solid #cfd8dc; 
        }
        .tabs.custom-tabs .tab a { 
            color: #546e7a !important; 
            font-weight: bold; 
            transition: background-color .3s;
        }
        .tabs.custom-tabs .tab a:hover { 
            color: #455a64 !important; 
            background-color: rgba(69, 90, 100, 0.05); 
        }
        .tabs.custom-tabs .tab a.active { 
            color: #263238 !important; 
            background-color: rgba(69, 90, 100, 0.1); 
        }
        .tabs.custom-tabs .indicator { 
            background-color: #455a64 !important; 
            height: 3px; 
        }

        .btn-custom { background-color: #546e7a !important; }
        .btn-excel { background-color: #2e7d32 !important; } 
        
        .clickable-cell {
            cursor: pointer;
            color: #1976d2;
            text-decoration: underline;
            font-weight: bold;
        }
        .clickable-cell:hover { background-color: #e3f2fd !important; }

        /* =========================================
           PDF保存 用の出力スタイル (A4縦)
           ========================================= */
        .print-title, .print-date { display: none; }

        body.pdf-export-mode { 
            background-color: #fff !important; 
            overflow: visible !important;
        }
        body.pdf-export-mode nav, 
        body.pdf-export-mode .card:first-of-type, 
        body.pdf-export-mode .tabs, 
        body.pdf-export-mode .btn-print,
        body.pdf-export-mode .toast,
        body.pdf-export-mode #toast-container { display: none !important; }
        
        body.pdf-export-mode .container { width: auto !important; max-width: none !important; margin: 0 !important; padding: 0 !important; overflow: visible !important; }
        body.pdf-export-mode .card-custom { box-shadow: none !important; border: none !important; margin: 0 !important; background-color: transparent !important; }
        body.pdf-export-mode .card-content { padding: 0 !important; overflow: visible !important; }

        body.pdf-export-mode #tab-trainee, 
        body.pdf-export-mode #tab-ssw, 
        body.pdf-export-mode #tab-total {
            display: block !important; 
            visibility: visible !important; 
            height: auto !important; 
            padding: 30px !important; 
            width: max-content !important; 
            min-width: 1300px; 
            background-color: #fff !important;
            opacity: 1 !important;
        }
        
        body.pdf-export-mode .print-title { display: block !important; text-align: center; font-size: 20pt; font-weight: bold; margin-bottom: 20px; color: #000; }
        body.pdf-export-mode .print-date { display: block !important; text-align: right; font-size: 14pt; margin-top: 20px; color: #000; }
        
        body.pdf-export-mode .table-wrapper { 
            max-height: none !important; 
            overflow: visible !important; 
        }
        
        body.pdf-export-mode thead th,
        body.pdf-export-mode tfoot th,
        body.pdf-export-mode .sticky-col-no,
        body.pdf-export-mode .sticky-col-company {
            position: static !important;
            box-shadow: none !important;
        }

        body.pdf-export-mode table { 
            border-collapse: collapse !important; 
            width: max-content !important; 
            border: 1.5px solid #000 !important; 
            table-layout: auto !important;
        }
        
        body.pdf-export-mode th, body.pdf-export-mode td { 
            border: 1px solid #333 !important; 
            color: #000 !important; 
            padding: 6px 4px !important;
            font-size: 10pt !important;
        }

        /* 国籍別などの列見出しの折り返し設定 */
        body.pdf-export-mode thead th {
            white-space: normal !important;
            word-wrap: break-word !important;
            font-size: 9pt !important; 
            line-height: 1.1 !important;
            min-width: 50px !important;
        }

        /* 企業名列のはみ出し防止 */
        body.pdf-export-mode td.sticky-col-company,
        body.pdf-export-mode th.sticky-col-company {
            white-space: normal !important;
            word-wrap: break-word !important;
            max-width: 240px !important;
            width: 240px !important;
            text-align: left !important;
            line-height: 1.2 !important;
        }

        /* データセルは基本折り返さないが見切れも許容しない */
        body.pdf-export-mode td:not(.sticky-col-company) {
            white-space: nowrap !important;
        }
    </style>
</head>
<body>

    <nav class="navbar-custom">
        <div class="nav-wrapper container">
            <a href="#" class="brand-logo" style="font-size: 1.5rem;"><i class="material-icons">grid_on</i> 外国人材 集計表</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 20px; width: 98%; max-width: 1600px;">
        <div class="card card-custom">
            <div class="card-content">
                <span class="card-title" style="font-weight: bold;"><i class="material-icons left">file_upload</i>Excel読み込み</span>
                <p style="color: #546e7a; margin-bottom: 15px;">
                    対象のExcelファイルを選択してください。特定技能の各シートは指定の列を優先的に集計します。
                </p>
                <div class="file-field input-field">
                    <div class="btn btn-custom"><span>ファイルを選択</span><input type="file" id="excelFileInput" accept=".xlsx, .xls"></div>
                    <div class="file-path-wrapper"><input class="file-path validate" type="text" placeholder="Excelファイルを選択してください"></div>
                </div>
            </div>
        </div>

        <div class="card card-custom">
            <div class="card-content" style="padding: 0;">
                <div class="row" style="margin-bottom: 0;">
                    <div class="col s12 m8">
                        <ul class="tabs custom-tabs">
                            <li class="tab col s4"><a href="#tab-trainee" class="active">技能実習</a></li>
                            <li class="tab col s4"><a href="#tab-ssw">特定技能・特定活動</a></li>
                            <li class="tab col s4"><a href="#tab-total">総合計</a></li>
                        </ul>
                    </div>
                    <div class="col s12 m4 right-align" style="margin-top: 5px; padding-right: 20px;">
                        <button class="btn waves-effect waves-light btn-custom" onclick="downloadPDF()"><i class="material-icons left">picture_as_pdf</i>PDF保存</button>
                    </div>

                    <div id="export-container">
                        <div id="tab-trainee" class="col s12">
                            <div class="print-title">外国人材 在籍数集計表 【技能実習】</div>
                            <div class="table-wrapper"><table><thead id="thead-trainee"></thead><tbody id="tbody-trainee"></tbody><tfoot id="tfoot-trainee"></tfoot></table></div>
                            <div class="print-date"></div>
                        </div>
                        <div id="tab-ssw" class="col s12">
                            <div class="print-title">外国人材 在籍数集計表 【特定技能・特定活動】</div>
                            <div class="table-wrapper"><table><thead id="thead-ssw"></thead><tbody id="tbody-ssw"></tbody><tfoot id="tfoot-ssw"></tfoot></table></div>
                            <div class="print-date"></div>
                        </div>
                        <div id="tab-total" class="col s12">
                            <div class="print-title">外国人材 在籍数集計表 【総合計】</div>
                            <div class="table-wrapper"><table><thead id="thead-total"></thead><tbody id="tbody-total"></tbody><tfoot id="tfoot-total"></tfoot></table></div>
                            <div class="print-date"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 詳細モーダル -->
    <div id="detailModal" class="modal modal-fixed-footer" style="width: 90%; max-height: 80%;">
        <div class="modal-content">
            <h5 id="modalTitle" style="font-weight: bold; color: #37474f;">詳細一覧</h5>
            <table class="striped highlight">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>企業名</th>
                        <th>名前</th>
                        <th>国籍</th>
                        <th>在留資格</th>
                        <th>シート名</th>
                        <th>Excel行</th>
                    </tr>
                </thead>
                <tbody id="modalTableBody"></tbody>
            </table>
        </div>
        <div class="modal-footer">
            <button class="btn waves-effect waves-light btn-excel" onclick="exportModalToExcel()" style="margin-right: 10px;">
                <i class="material-icons left">file_download</i>Excel出力
            </button>
            <a href="#!" class="modal-close waves-effect btn-flat">閉じる</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        let records = [];
        let companyMaster = [];
        let nationalityMaster = [];
        let currentModalFilteredData = []; 
        let currentModalTitle = ""; 

        document.addEventListener('DOMContentLoaded', () => {
            M.Tabs.init(document.querySelectorAll('.tabs'));
            M.Modal.init(document.querySelectorAll('.modal'));
            renderMatrixTables();
        });

        function setPrintDate() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const dateStr = `出力日: ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
            document.querySelectorAll('.print-date').forEach(el => { el.innerText = dateStr; });
            return { year: now.getFullYear(), month: pad(now.getMonth()+1), date: pad(now.getDate()), hours: pad(now.getHours()), minutes: pad(now.getMinutes()) };
        }

        async function downloadPDF() {
            if (companyMaster.length === 0) {
                M.toast({html: 'データが読み込まれていません', classes: 'rounded orange'});
                return;
            }
            
            M.toast({html: 'PDFを生成中... 少々お待ちください', classes: 'rounded teal'});
            const d = setPrintDate();
            document.body.classList.add('pdf-export-mode');

            await new Promise(r => setTimeout(r, 1000));

            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('portrait', 'mm', 'a4');
                const tabs = ['tab-trainee', 'tab-ssw', 'tab-total'];
                
                for (let i = 0; i < tabs.length; i++) {
                    const targetEl = document.getElementById(tabs[i]);
                    if (!targetEl) continue;

                    const canvas = await html2canvas(targetEl, { 
                        scale: 2, 
                        useCORS: true, 
                        backgroundColor: '#ffffff',
                        windowWidth: 1600 
                    });

                    if (i > 0) pdf.addPage();

                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    const pdfWidth = 190; 
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                    
                    let finalWidth = pdfWidth;
                    let finalHeight = pdfHeight;
                    if (finalHeight > 277) {
                        const ratio = 277 / finalHeight;
                        finalHeight = 277;
                        finalWidth = finalWidth * ratio;
                    }

                    const xOffset = (210 - finalWidth) / 2;
                    pdf.addImage(imgData, 'JPEG', xOffset, 10, finalWidth, finalHeight);
                }

                pdf.save(`外国人材在籍数集計表_${d.year}${d.month}${d.date}${d.hours}${d.minutes}.pdf`);
                M.toast({html: 'PDFの保存が完了しました', classes: 'rounded green'});
            } catch (err) {
                console.error(err);
                M.toast({html: 'PDF生成エラーが発生しました', classes: 'rounded red'});
            } finally {
                document.body.classList.remove('pdf-export-mode');
            }
        }

        document.getElementById('excelFileInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = evt => {
                const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                records = []; companyMaster = []; nationalityMaster = [];
                workbook.SheetNames.forEach(name => {
                    if (name.includes("技能実習") || name.includes("特定技能") || name.includes("特定活動")) {
                        const data = XLSX.utils.sheet_to_json(workbook.Sheets[name], { header: 1, defval: "" });
                        processSheetData(data, name);
                    }
                });
                companyMaster.sort(); nationalityMaster.sort();
                renderMatrixTables();
                M.toast({ html: '集計が完了しました', classes: 'rounded teal' });
            };
            reader.readAsArrayBuffer(file);
        });

        function processSheetData(data, sheetName) {
            let headerIdx = -1;
            for (let i = 0; i < Math.min(25, data.length); i++) {
                if(!data[i]) continue;
                const rowStr = data[i].join('');
                if (rowStr.includes('会社名') || rowStr.includes('企業名')) { headerIdx = i; break; }
            }
            if (headerIdx === -1) return;

            const headers = data[headerIdx].map(h => String(h || '').replace(/\s/g, ''));
            const colComp = headers.findIndex(h => h.includes('会社名') || h.includes('企業名'));

            let colName, colNat, colStat;
            const isSpecificSswSheet = ["特定技能◆その他◆", "特定技能◆ロイヤルデリカ◆", "特定技能◆第一屋製パン◆"].includes(sheetName);
            const isYukiSheet = (sheetName === "特定技能◆ユキグニファクトリー◆");

            if (isSpecificSswSheet) {
                colName = 5; colNat = 11; colStat = 18;
            } else if (isYukiSheet) {
                colName = 6; colNat = 12; colStat = 19;
            } else {
                colName = headers.findIndex(h => h.includes('名前') || h.includes('氏名') || h === 'Name' || h.includes('実習生名'));
                colNat = headers.findIndex(h => h === '国籍');
                colStat = headers.findIndex(h => h.includes('ステータス') || h.includes('資格'));
            }

            if (colComp === -1) return;

            const isTraineeSheet = sheetName.includes("技能実習");

            for (let i = headerIdx + 1; i < data.length; i++) {
                const row = data[i];
                if (!row || !row[colComp] || String(row[colComp]).trim() === "") continue;

                const statusRaw = String(row[colStat] || "");
                // 除外判定：他社へ を含む場合はスキップ
                const exclude = ['帰国', '退職', '失踪', '辞退', 'キャンセル', 'ｷｬﾝｾﾙ', 'IVY', '他社へ'];
                if (exclude.some(k => statusRaw.includes(k) && !statusRaw.includes('予定'))) continue;

                let status = null;
                const s = statusRaw.replace(/[Ａ-Ｚａ-ｚ０-９]/g, m => String.fromCharCode(m.charCodeAt(0) - 0xFEE0)).replace(/\s/g, '');

                if (s.includes('入国前') && !s.includes('キャンセル')) {
                    status = isTraineeSheet ? 'preEntry' : 'sswPreEntry';
                } else if (isTraineeSheet) {
                    if (s.includes('3号')) status = 'trainee3';
                    else if (s.includes('2号')) status = 'trainee2';
                    else status = 'trainee1';
                } else {
                    if (s.includes('特定活動')) status = 'designated';
                    else if (s.includes('3号') || s.includes('3')) status = 'ssw3';
                    else if (s.includes('2号') || s.includes('2')) status = 'ssw2';
                    else status = 'ssw1';
                }

                if (status) {
                    const nat = (colNat !== -1 && row[colNat]) ? String(row[colNat]).trim() : '不明';
                    records.push({ 
                        company: String(row[colComp]).trim(), 
                        name: (colName !== -1 && row[colName]) ? String(row[colName]).trim() : '不明', 
                        nationality: nat, 
                        status, 
                        count: 1, 
                        sheet: sheetName, 
                        rowNum: i + 1 
                    });
                    if (!companyMaster.includes(String(row[colComp]).trim())) companyMaster.push(String(row[colComp]).trim());
                    if (nat !== '不明' && !nationalityMaster.includes(nat)) nationalityMaster.push(nat);
                }
            }
        }

        function renderMatrixTables() {
            const nats = nationalityMaster.length > 0 ? nationalityMaster : ['国籍'];
            const thNats = nats.map(n => `<th>${n}</th>`).join('');
            const natsColSpan = nats.length;

            document.getElementById('thead-trainee').innerHTML = `<tr><th rowspan="2" class="sticky-col-no">No.</th><th rowspan="2" class="sticky-col-company">企業名</th><th colspan="5">資格別(実習)</th><th colspan="${natsColSpan}">国籍別(実習)</th></tr><tr><th>入国前</th><th>1号</th><th>2号</th><th>3号</th><th class="total-col">小計</th>${thNats}</tr>`;
            document.getElementById('thead-ssw').innerHTML = `<tr><th rowspan="2" class="sticky-col-no">No.</th><th rowspan="2" class="sticky-col-company">企業名</th><th colspan="6">資格別(特定)</th><th colspan="${natsColSpan}">国籍別(特定)</th></tr><tr><th>入国前</th><th>特定1</th><th>特定2</th><th>特定3</th><th>特活</th><th class="total-col">小計</th>${thNats}</tr>`;
            document.getElementById('thead-total').innerHTML = `<tr><th rowspan="2" class="sticky-col-no">No.</th><th rowspan="2" class="sticky-col-company">企業名</th><th colspan="4">大項目</th><th colspan="${natsColSpan}">国籍別</th></tr><tr><th>実習計</th><th>特定計</th><th>特活</th><th class="total-col">総合計</th>${thNats}</tr>`;

            if (companyMaster.length === 0) {
                const emptyMsg = `<tr><td colspan="10" style="padding:40px; text-align:center; color:#999;">Excelファイルを読み込んでください</td></tr>`;
                document.getElementById('tbody-trainee').innerHTML = emptyMsg;
                document.getElementById('tbody-ssw').innerHTML = emptyMsg;
                document.getElementById('tbody-total').innerHTML = emptyMsg;
                return;
            };

            const agg = {};
            companyMaster.forEach(c => {
                agg[c] = { preEntry:0, trainee1:0, trainee2:0, trainee3:0, sswPreEntry:0, ssw1:0, ssw2:0, ssw3:0, designated:0, nats_trainee: {}, nats_ssw: {}, nats_total: {} };
                nats.forEach(n => { agg[c].nats_trainee[n]=0; agg[c].nats_ssw[n]=0; agg[c].nats_total[n]=0; });
            });

            records.forEach(r => {
                agg[r.company][r.status] += r.count;
                if (r.status === 'preEntry' || r.status.startsWith('trainee')) agg[r.company].nats_trainee[r.nationality] += r.count;
                else agg[r.company].nats_ssw[r.nationality] += r.count;
                agg[r.company].nats_total[r.nationality] += r.count;
            });

            const d = (val, comp, stat, nat, extraClass = '', isTh = false) => {
                const tag = isTh ? 'th' : 'td';
                if (val === 0) return `<${tag} class="${extraClass}"></${tag}>`;
                return `<${tag} class="${extraClass} clickable-cell" onclick="showModal('${comp}', '${stat}', '${nat}')">${val}</${tag}>`;
            };

            let gPre=0, gT1=0, gT2=0, gT3=0, gTSub=0, gSPre=0, gS1=0, gS2=0, gS3=0, gDes=0, gSSub=0, gAll=0;
            let gNTr={}, gNSSw={}, gNTot={};
            nats.forEach(n => { gNTr[n]=0; gNSSw[n]=0; gNTot[n]=0; });

            const stats = companyMaster.map(c => {
                const r = agg[c];
                const trSub = r.preEntry + r.trainee1 + r.trainee2 + r.trainee3;
                const sswOnly = r.sswPreEntry + r.ssw1 + r.ssw2 + r.ssw3;
                const sswSub = sswOnly + r.designated;
                return { c, r, trSub, sswOnly, sswSub, all: trSub + sswSub };
            });

            stats.forEach(s => {
                gPre += s.r.preEntry; gT1 += s.r.trainee1; gT2 += s.r.trainee2; gT3 += s.r.trainee3; gTSub += s.trSub;
                gSPre += s.r.sswPreEntry; gS1 += s.r.ssw1; gS2 += s.r.ssw2; gS3 += s.r.ssw3; gDes += s.r.designated; gSSub += s.sswSub; gAll += s.all;
                nats.forEach(n => {
                    gNTr[n] += s.r.nats_trainee[n];
                    gNSSw[n] += s.r.nats_ssw[n];
                    gNTot[n] += s.r.nats_total[n];
                });
            });

            const draw = (id, footerId, filter, sortKey, rowFn, footerRowFn) => {
                let h = '', idx = 1;
                stats.filter(filter).sort((a,b) => b[sortKey] - a[sortKey] || a.c.localeCompare(b.c,'ja')).forEach(s => h += rowFn(s, idx++));
                document.getElementById(id).innerHTML = h;
                document.getElementById(footerId).innerHTML = footerRowFn();
            };

            draw('tbody-trainee', 'tfoot-trainee', s => s.trSub > 0, 'trSub', (s, i) => {
                let ns = ''; nats.forEach(n => ns += d(s.r.nats_trainee[n], s.c, 'trainee_all', n));
                return `<tr><td class="sticky-col-no">${i}</td><td class="sticky-col-company">${s.c}</td>${d(s.r.preEntry,s.c,'preEntry','ALL')}${d(s.r.trainee1,s.c,'trainee1','ALL')}${d(s.r.trainee2,s.c,'trainee2','ALL')}${d(s.r.trainee3,s.c,'trainee3','ALL')}${d(s.trSub,s.c,'trainee_all','ALL','total-col')}${ns}</tr>`;
            }, () => {
                let ns = ''; nats.forEach(n => ns += d(gNTr[n], 'ALL', 'trainee_all', n, '', true));
                return `<tr><th class="sticky-col-no"></th><th class="sticky-col-company">総計</th>${d(gPre,'ALL','preEntry','ALL','',true)}${d(gT1,'ALL','trainee1','ALL','',true)}${d(gT2,'ALL','trainee2','ALL','',true)}${d(gT3,'ALL','trainee3','ALL','',true)}${d(gTSub,'ALL','trainee_all','ALL','total-col',true)}${ns}</tr>`;
            });

            draw('tbody-ssw', 'tfoot-ssw', s => s.sswSub > 0, 'sswSub', (s, i) => {
                let ns = ''; nats.forEach(n => ns += d(s.r.nats_ssw[n], s.c, 'ssw_all', n));
                return `<tr><td class="sticky-col-no">${i}</td><td class="sticky-col-company">${s.c}</td>${d(s.r.sswPreEntry,s.c,'sswPreEntry','ALL')}${d(s.r.ssw1,s.c,'ssw1','ALL')}${d(s.r.ssw2,s.c,'ssw2','ALL')}${d(s.r.ssw3,s.c,'ssw3','ALL')}${d(s.r.designated,s.c,'designated','ALL')}${d(s.sswSub,s.c,'ssw_all','ALL','total-col')}${ns}</tr>`;
            }, () => {
                let ns = ''; nats.forEach(n => ns += d(gNSSw[n], 'ALL', 'ssw_all', n, '', true));
                return `<tr><th class="sticky-col-no"></th><th class="sticky-col-company">総計</th>${d(gSPre,'ALL','sswPreEntry','ALL','',true)}${d(gS1,'ALL','ssw1','ALL','',true)}${d(gS2,'ALL','ssw2','ALL','',true)}${d(gS3,'ALL','ssw3','ALL','',true)}${d(gDes,'ALL','designated','ALL','',true)}${d(gSSub,'ALL','ssw_all','ALL','total-col',true)}${ns}</tr>`;
            });

            draw('tbody-total', 'tfoot-total', s => s.all > 0, 'all', (s, i) => {
                let ns = ''; nats.forEach(n => ns += d(s.r.nats_total[n], s.c, 'all', n));
                const sswTotalOnly = s.r.sswPreEntry + s.r.ssw1 + s.r.ssw2 + s.r.ssw3;
                return `<tr><td class="sticky-col-no">${i}</td><td class="sticky-col-company">${s.c}</td>${d(s.trSub,s.c,'trainee_all','ALL')}${d(sswTotalOnly,s.c,'ssw_only','ALL')}${d(s.r.designated,s.c,'designated','ALL')}${d(s.all,s.c,'all','ALL','total-col')}${ns}</tr>`;
            }, () => {
                let ns = ''; nats.forEach(n => ns += d(gNTot[n], 'ALL', 'all', n, '', true));
                return `<tr><th class="sticky-col-no"></th><th class="sticky-col-company">総計</th>${d(gTSub,'ALL','trainee_all','ALL','',true)}${d(gSPre+gS1+gS2+gS3,'ALL','ssw_only','ALL','',true)}${d(gDes,'ALL','designated','ALL','',true)}${d(gAll,'ALL','all','ALL','total-col',true)}${ns}</tr>`;
            });
        }

        function showModal(comp, stat, nat) {
            let f = records.filter(r => {
                if (comp !== 'ALL' && r.company !== comp) return false;
                if (nat !== 'ALL' && r.nationality !== nat) return false;
                if (stat === 'trainee_all') return r.status === 'preEntry' || r.status.startsWith('trainee');
                if (stat === 'ssw_only') return r.status === 'sswPreEntry' || r.status.startsWith('ssw');
                if (stat === 'ssw_all') return r.status === 'sswPreEntry' || r.status.startsWith('ssw') || r.status === 'designated';
                if (stat === 'all') return true;
                return r.status === stat;
            });
            
            currentModalFilteredData = f;
            currentModalTitle = `${comp === 'ALL' ? '全企業' : comp}${nat === 'ALL' ? '' : `_${nat}`}_${getStatusLabel(stat)}`;

            document.getElementById('modalTitle').innerText = `${comp === 'ALL' ? '全企業' : comp}${nat === 'ALL' ? '' : ` (${nat})`} 詳細（${f.length}名）`;
            let h = '';
            f.forEach((r, idx) => {
                h += `<tr><td>${idx+1}</td><td>${r.company}</td><td>${r.name}</td><td>${r.nationality}</td><td>${getStatusLabel(r.status)}</td><td>${r.sheet}</td><td>${r.rowNum}</td></tr>`;
            });
            document.getElementById('modalTableBody').innerHTML = h;
            M.Modal.getInstance(document.getElementById('detailModal')).open();
        }

        function exportModalToExcel() {
            if (currentModalFilteredData.length === 0) return;
            const now = new Date();
            const timeStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
            const exportData = currentModalFilteredData.map((r, idx) => ({
                'No': idx + 1,
                '企業名': r.company,
                '名前': r.name,
                '国籍': r.nationality,
                '在留資格': getStatusLabel(r.status),
                '元シート名': r.sheet,
                'Excel行番号': r.rowNum
            }));
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "詳細一覧");
            const filename = `詳細一覧_${currentModalTitle}_${timeStr}.xlsx`;
            XLSX.writeFile(wb, filename);
            M.toast({ html: 'Excelファイルを出力しました', classes: 'rounded green' });
        }

        function getStatusLabel(s) {
            const l = { 
                'preEntry': '入国前(実習)', 'sswPreEntry': '入国前(特定)', 
                'trainee1': '実習1号', 'trainee2': '実習2号', 'trainee3': '実習3号', 
                'ssw1': '特定1号', 'ssw2': '特定2号', 'ssw3': '特定3号', 
                'designated': '特定活動', 'trainee_all': '技能実習計', 
                'ssw_only': '特定技能計', 'ssw_all': '特定・活動計', 'all': '総合計' 
            };
            return l[s] || s;
        }
    </script>
</body>
</html>
